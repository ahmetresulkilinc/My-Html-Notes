<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .btn {
        text-align: center;
        text-decoration: none;
        display: inline-block;
        padding: 7px;
        font-size: 16px;
        cursor: pointer;
        border: none;
      }
      .btn-primary {
        background-color: #fc997c;
        color: #fff;
        border: 2px solid #fc997c;
      }
      .btn-primary:hover {
        background-color: black;
        color: pink;
        border: 2px solid #fc997c;
      }
      .btn-outline-primary {
        background-color: black;
        color: pink;
        border: 2px solid #fc997c;
      }
      .btn-outline-primary:hover {
        background-color: #fc997c;
        color: #fff;
        border: 2px solid #fc997c;
      }
      .btn-secondary {
        background-color: #2e2e;
        color: #fff;
        border: 2px solid #2e2e;
      }

      .btn-secondary:hover {
        background-color: yellow;
        color: blue;
        border: 2px solid #2e2e;
      }
      .btn-outline-secondary {
        background-color: yellow;
        color: blue;
        border: 2px solid #2e2e;
      }
      .btn-outline-secondary:hover {
        background-color: #2e2e;
        color: #fff;
        border: 2px solid #2e2e;
      }
    </style>
  </head>

  <body>
    <a class="btn btn-primary" href="">Button</a>
    <a class="btn btn-secondary" href="">Button</a>
    <br /><br />
    <a class="btn btn-outline-primary" href="">Button</a>
    <a class="btn btn-outline-secondary" href="">Button</a>
  </body>
</html>
