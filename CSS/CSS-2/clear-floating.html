<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clear Floating</title>
  </head>
  <style>
    #container {
      background-color: cornflowerblue;
    }
    .box {
      width: 150px;
      height: 150px;
      background-color: brown;
      float: right;
    }
    .clearfix::after {
      content: "";
      display: block;
      clear: both;
    }
    /* #box1 {
      float: left;
    } */
  </style>
  <body>
    <div id="container" class="clearfix">
      <div class="box" id="box1">box 1</div>
      <div class="box">box 2</div>
      <div class="box">box 3</div>
      <!-- <div style="clear: both"></div> -->
    </div>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Impedit,
      consectetur magni! Est, dicta culpa voluptatibus reprehenderit labore,
      expedita quaerat qui dignissimos doloremque accusamus repellat veniam nemo
      suscipit eveniet molestias soluta?
    </p>
  </body>
</html>
