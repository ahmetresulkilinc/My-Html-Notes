<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: gray;
      }
      h1 {
        display: none;
      }
      /* phone  */
      @media (max-width: 575px) {
        #phone h1 {
          display: block;
        }
        body {
          background-color: rgb(118, 5, 24);
        }
      }

      /* landspace  */
      @media (min-width: 576px) and (max-width: 767px) {
        #landspace h1 {
          display: block;
        }
        body {
          background-color: pink;
        }
      }
      /* tables */
      @media (min-width: 768px) and (max-width: 991px) {
        #landspace h1 {
          display: block;
        }
        body {
          background-color: aqua;
        }
      }
      /* desktop */
      @media (min-width: 992px) and (max-width: 1099px) {
        #desktop h1 {
          display: block;
        }
        body {
          background-color: red;
        }
      }
      /* largedesktop */
      @media (min-width: 1100px) and (max-width: 1199px) {
        #largedesktop h1 {
          display: block;
        }
        body {
          background-color: aqua;
        }
      }
      /* extralargedesktop */
      @media (min-width: 1200px) and (max-width: 1699px) {
        #extralargedesktop h1 {
          display: block;
        }
        body {
          background-color: rgb(195, 255, 0);
        }
      }
    </style>
  </head>
  <body>
    <div id="phone"><h1>phone</h1></div>
    <div id="landspace"><h1>landspace</h1></div>
    <div id="desktop"><h1>desktop</h1></div>
    <div id="largedesktop"><h1>large</h1></div>
    <div id="extralargedesktop"><h1>extra</h1></div>
  </body>
</html>
